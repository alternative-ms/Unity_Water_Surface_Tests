<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>{{{PRODUCT_NAME}}}</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>

    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
    </div>
    <script>
      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var buildUrl = "Build/";
      var loaderUrl = buildUrl + "{{{LOADER_FILENAME}}}";
      var config = {
        dataUrl: buildUrl + "{{{DATA_FILENAME}}}",
        frameworkUrl: buildUrl + "{{{FRAMEWORK_FILENAME}}}",
        codeUrl: buildUrl + "{{{CODE_FILENAME}}}",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "{{{COMPANY_NAME}}}",
        productName: "{{{PRODUCT_NAME}}}",
        productVersion: "{{{PRODUCT_VERSION}}}"
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        container.className = "unity-mobile";
        config.devicePixelRatio = Math.min(window.devicePixelRatio, 2); 
      }

      canvas.style.background = "url('" + buildUrl + "/{{{ BACKGROUND_FILENAME.replace('.unityweb', '') }}}') center / cover";
      loadingBar.style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          loadingBar.style.display = "none";
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);

      container.addEventListener('mousedown', function(e) {
          e.preventDefault();
      }, false);

      container.oncontextmenu = function(e) {
          e.preventDefault();
      };

      document.addEventListener('touchmove', function(e) {
          if (e.touches.length > 1) return;
          e.preventDefault();
      }, { passive: false });


      function resizeMobileGame() {
          var container = document.querySelector("#unity-container");
          container.style.height = window.innerHeight + "px";
      }

      resizeMobileGame();

      window.addEventListener('resize', resizeMobileGame);
      window.addEventListener('orientationchange', resizeMobileGame);

    </script>
  </body>
</html>
